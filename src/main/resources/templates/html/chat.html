<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candidate Profile AI Agent</title>

<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

	<input type="hidden"
	       id="sessionId"
	       th:value="${currentSession != null ? currentSession.id : ''}" />
		   
<div class="chat-page">

    <!-- Sidebar -->
    <div class="sidebar">

        <h2>Candidate AI</h2>

        <div class="profile-card">
            <h3 th:text="${user.username}">User Name</h3>
            <p th:text="${user.email}">user@gmail.com</p>
        </div>

        <hr>

        <a href="#" class="menu-item" onclick="newChat(); return false;">
            💬 New Chat
        </a>

        <hr>

        <h3 class="history-title">Recent Chats</h3>

        <div class="history-list">

			<div th:each="chatSession : ${sessions}">

			    <a th:href="@{'/chat/' + ${chatSession.id}}" class="history-item">

			        <span th:text="${chatSession.title}"></span>

			    </a>

			</div>

        </div>

        <hr>

        <a href="/logout" class="menu-item">
            🚪 Logout
        </a>

    </div>

    <!-- Chat Section -->
    <div class="chat-section">

        <div class="chat-header">
            Candidate Profile AI Agent
            <span class="status">🟢 Online</span>
        </div>

        <div id="chat-box" class="chat-box">

            <div class="bot-message">
                👋 Welcome to Candidate Profile AI
            </div>

            <div th:each="chat : ${chatHistory}">

                <div class="user-message">
                    <strong>You</strong><br>
                    <span th:text="${chat.question}"></span>
                </div>

                <div class="ai-message">
                    <strong>AI</strong><br>
                    <span th:utext="${chat.answer}"></span>
                </div>

            </div>

        </div>

        <div class="input-area">

            <input type="text" id="question" placeholder="Ask anything...">
            <button onclick="askQuestion()">Send</button>

        </div>

    </div>

</div>

<script src="/js/chat.js"></script>

</body>
</html>
